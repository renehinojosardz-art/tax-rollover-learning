<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Answer Log</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #647184;
      --paper: #ffffff;
      --wash: #f5f6f8;
      --line: #d9dee7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--wash);
      line-height: 1.5;
    }
    main {
      width: min(100%, 980px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 32px 18px 56px;
      background: var(--paper);
    }
    header {
      padding: 10px 0 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.04;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
<main>
  <header>
    <h1>Answer Log</h1>
    <p>Saved answers from this browser. Use copy or export when you want Codex to review and update the private learning log.</p>
  </header>
  <div data-answer-log></div>
</main>
<script src="assets/lesson-log.js"></script>
</body>
</html>
